name: Monitor Hudson Sailing Events

on:
  schedule:
    # Every 15 minutes, deliberately offset from :00/:15/:30/:45 to dodge
    # peak load on the GitHub Actions scheduler (which silently delays or
    # skips runs at popular times). Note: GitHub never guarantees on-time
    # cron runs — delays of several minutes are normal, and the very first
    # run after enabling a workflow can take up to an hour.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}  # allows manual runs from the Actions tab

# Allow the workflow to commit updated state back to the repo.
permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          HUDSON_USERNAME: ${{ secrets.HUDSON_USERNAME }}
          HUDSON_PASSWORD: ${{ secrets.HUDSON_PASSWORD }}
          NTFY_TOPIC:      ${{ secrets.NTFY_TOPIC }}
          EVENT_KEYWORD:   ${{ vars.EVENT_KEYWORD }}
          WEEKDAYS:        ${{ vars.WEEKDAYS }}
          LOOKAHEAD_DAYS:  ${{ vars.LOOKAHEAD_DAYS }}
        run: python monitor.py

      - name: Commit state changes (if any)
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update monitor state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
